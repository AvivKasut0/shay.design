<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Shay Design — Admin</title>
  <link rel="stylesheet" href="/css/admin.css">
  <script>
    (function(){
      var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);
    })();
  </script>
</head>
<body>

  <header class="admin-bar">
    <span class="admin-brand">Shay Design</span>
    <div class="admin-tabs" id="admin-tabs"></div>
    <div class="admin-actions">
      <a href="/" target="_blank" class="btn btn-ghost">View Site ↗</a>
      <button id="btn-save" class="btn btn-save">Save</button>
    </div>
  </header>

  <div class="admin-body">
    <aside class="admin-sidebar" id="sidebar"></aside>
    <main class="admin-preview" id="preview">
      <div class="preview-toolbar" id="preview-toolbar"></div>
      <div class="preview-body" id="preview-body">
        <iframe id="preview-frame" src="/?preview=1" title="Preview"></iframe>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
