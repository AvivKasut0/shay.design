<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Shay Design</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,300&display=swap" rel="stylesheet">
  <script>
    (function(){
      var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);
      if(t==='dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body>

  <header id="admin-bar">
    <span id="admin-brand">Shay Design</span>
    <div id="admin-tabs"></div>
    <div id="admin-actions">
      <a id="btn-view" href="/" target="_blank">
        View
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
      <button id="btn-save">Save</button>
    </div>
  </header>

  <div id="admin-body">
    <aside id="sidebar"></aside>
    <main id="preview">
      <div id="preview-toolbar"></div>
      <div id="preview-body">
        <iframe id="preview-frame" src="/?preview=1" title="Preview"></iframe>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
