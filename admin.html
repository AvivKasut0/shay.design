<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Shay Design</title>
  <script>
    (function(){
      var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light');
      document.documentElement.setAttribute('data-theme',t);
      if(t==='dark') document.documentElement.classList.add('dark');
    })();
  </script>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>tailwind.config={darkMode:'class',theme:{extend:{}}}</script>
  <link rel="stylesheet" href="/css/admin.css">
</head>
<body class="bg-zinc-100 dark:bg-zinc-950 text-zinc-900 dark:text-zinc-100 h-screen overflow-hidden antialiased">

  <header class="fixed inset-x-0 top-0 h-12 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 flex items-center px-4 gap-2 z-50">
    <span class="text-[10.5px] font-bold tracking-[0.12em] uppercase text-zinc-900 dark:text-zinc-100 mr-2 shrink-0 select-none">Shay</span>
    <div id="admin-tabs" class="flex-1 flex gap-0.5 overflow-x-auto scrollbar-hide min-w-0 items-center"></div>
    <div id="admin-actions" class="flex gap-1.5 items-center ml-auto shrink-0">
      <a id="btn-view" href="/" target="_blank"
         class="inline-flex items-center gap-1 px-2.5 py-1.5 text-xs font-medium text-zinc-500 dark:text-zinc-400 hover:text-zinc-900 dark:hover:text-zinc-100 border border-zinc-200 dark:border-zinc-700 rounded-md hover:border-zinc-300 dark:hover:border-zinc-600 transition-colors no-underline">
        View
        <svg class="w-3 h-3" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"/>
          <polyline points="15 3 21 3 21 9"/><line x1="10" y1="14" x2="21" y2="3"/>
        </svg>
      </a>
      <button id="btn-save"
              class="inline-flex items-center px-3 py-1.5 text-xs font-semibold bg-zinc-900 dark:bg-zinc-100 text-white dark:text-zinc-900 rounded-md hover:bg-zinc-700 dark:hover:bg-zinc-200 transition-colors">
        Save
      </button>
    </div>
  </header>

  <div class="fixed inset-0 top-12 flex">
    <aside id="sidebar"
           class="w-[272px] shrink-0 bg-white dark:bg-zinc-900 border-r border-zinc-200 dark:border-zinc-800 overflow-y-auto overflow-x-hidden pb-10 scrollbar-hide">
    </aside>
    <main id="preview" class="flex-1 overflow-hidden bg-zinc-100 dark:bg-zinc-950 flex flex-col">
      <div id="preview-toolbar"
           class="flex items-center justify-center gap-1 px-4 py-1.5 bg-white dark:bg-zinc-900 border-b border-zinc-200 dark:border-zinc-800 shrink-0">
      </div>
      <div id="preview-body" class="flex-1 overflow-hidden flex justify-center items-stretch">
        <iframe id="preview-frame" src="/?preview=1" title="Preview"></iframe>
      </div>
    </main>
  </div>

  <script src="/js/admin.js"></script>
</body>
</html>
